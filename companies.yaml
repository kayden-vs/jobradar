# NEW ATS PLATFORMS (from companies_found.yaml)
# ─────────────────────────────────────────────────────────────────────

# SmartRecruiters — list: api.smartrecruiters.com/v1/companies/{SLUG}/postings
#                   detail: api.smartrecruiters.com/v1/companies/{SLUG}/postings/{JOB_ID}
#                   page: careers.smartrecruiters.com/{SLUG}
#   NOTE: SmartRecruiters slugs are case-sensitive (use the exact company identifier)
smartrecruiters:
  - Upstox             # Upstox
  - Lendingkart        # Lendingkart
  - Turtlemint         # Turtlemint
  - Lokal              # Lokal
  - Cars24             # Cars24
  - ixigo              # ixigo
  - Freshworks         # Freshworks
  - Whatfix            # Whatfix
  - MercerMettl        # Mercer Mettl
  - InterviewMocha     # Interview Mocha
  - Skillate           # Skillate
  - ServiceNow         # ServiceNow India
  - Canva              # Canva India
  - Unacademy          # Unacademy
  - Dailymotion        # Dailymotion India

# Rippling ATS — list:   ats.rippling.com/api/v2/board/{SLUG}/jobs?pageSize=100
#                detail: ats.rippling.com/api/v2/board/{SLUG}/jobs/{JOB_UUID}
#                page:   ats.rippling.com/{SLUG}/jobs
rippling:
  - axio               # Axio
  - multiplier         # Multiplier
  - dub                # Dub

# BambooHR — list:   {SLUG}.bamboohr.com/careers/list  (JSON)
#             detail: {SLUG}.bamboohr.com/careers/{JOB_ID}  (HTML, no public JSON detail)
#             page:   {SLUG}.bamboohr.com/careers
bamboohr:
  - urban              # Urban Company
  - shadowfax          # Shadowfax
  - flyio              # Fly.io

# Recruitee — list: {SLUG}.recruitee.com/api/offers/  (JSON, description inside)
#             page: {SLUG}.recruitee.com/
recruitee:
  - salesforce         # Salesforce India

# Personio — list: {SLUG}.jobs.personio.de/xml?language=en  (XML feed, no auth needed)
#            page: {SLUG}.jobs.personio.de/
personio:
  - open               # Open Financial Technologies
  - josh               # Josh
  - amazon             # Amazon India
  - basecamp           # Basecamp

# Workday — list: POST {tenant}.{wd_server}.myworkdayjobs.com/wday/cxs/{tenant}/{site}/jobs
#           detail: GET  {tenant}.{wd_server}.myworkdayjobs.com/wday/cxs/{tenant}/{site}{externalPath}
#   NOTE: Each company needs tenant + wd_server + site (discovered via discover_workday.py, not guessable)
#   NOTE: Entries are dicts, not plain slugs — Workday requires 3 parameters per company
workday:
  - name: Proofpoint
    tenant: proofpoint
    wd_server: wd5
    site: proofpointcareers

  - name: Adobe
    tenant: adobe
    wd_server: wd5
    site: external_experienced

  - name: Samsung
    tenant: sec
    wd_server: wd3
    site: Samsung_Careers

  - name: BrowserStack
    tenant: browserstack
    wd_server: wd3
    site: External

  - name: Sprinklr
    tenant: sprinklr
    wd_server: wd1
    site: Careers

  - name: Cisco
    tenant: cisco
    wd_server: wd5
    site: cisco_careers

  - name: Workday
    tenant: workday
    wd_server: wd5
    site: workday
