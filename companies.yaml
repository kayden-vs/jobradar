# companies.yaml
# ─────────────────────────────────────────────────────────────────────
# HOW TO FIND THE CORRECT SLUG FOR A COMPANY:
#   1. Go to the company's Careers page
#   2. Click on any open job posting
#   3. Look at the URL of the job or application page:
#      - greenhouse.io/...  → add slug to 'greenhouse' list
#      - lever.co/...       → add slug to 'lever' list
#      - ashbyhq.com/...    → add slug to 'ashby' list
#      - workable.com/...   → add slug to 'workable' list
#   4. The slug is the company-specific part of the URL
#      e.g. boards.greenhouse.io/v1/boards/SLUG/jobs
#
# VERIFIED slugs (tested against live API, return 200):
# ─────────────────────────────────────────────────────────────────────

greenhouse:
  - groww              # ✅ verified — returns jobs
