# profile.yaml — YOUR job search preferences
# Keep this accurate. The AI uses this to score every job.

# ─────────────────────────────────────────────────────────────────
# SOURCE TOGGLES — set to false to skip a source completely
# ─────────────────────────────────────────────────────────────────
sources:
  ats:            true   # Greenhouse US/EU / Lever / Ashby / Workable API polling
  workday:        true   # Workday ATS — POST-based API polling (separate from ats due to different pattern)
  cutshort:       false  # Cutshort.io (public API unreliable — disabled)
  instahyre:      false   # Instahyre API + scraping fallback
  wellfound:      false  # DISABLED — blocks requests / shows verification wall
  serper:         true   # Google search dork discovery via Serper.dev
  hackernews:     false   # HN "Who is Hiring?" monthly thread
  reddit:         false  # DISABLED — only returns people-looking-for-work posts
  internshala:    true   # Internshala internships & fresher jobs (India #1)
  yc:             true   # YC portfolio company job board
  freshers_blogs: true   # Indian fresher blogs (RSS) + Cuvette.tech — high volume off-campus/internship listings
  naukri:         true   # Naukri.com — India's largest job board (API-based, fresher-filtered)
  hirist:         false  # Hirist.tech — India niche tech job board (JS-rendered, disable until tested) TODO: Test hirist and fix issues
  jobicy:         true   # Jobicy.com — free remote jobs API, good for catching remote-first companies open to India
  remoteok:       true   # RemoteOK — JSON API, dev/engineering jobs from global startups open to India timezone
  hiringcafe:     true   # hiring.cafe — aggregated ATS jobs via Next.js API, rich structured data, entry-level filtered


candidate:
  name: "Rohit Kumar Roy"
  email: "[EMAIL_ADDRESS]"

  # What you're looking for
  roles:
    primary:
      - "Backend Engineering Intern"
      - "Software Engineering Intern"
      - "Backend Developer Fresher"
      - "Junior Backend Developer"
      - "TypeScript Backend Intern"
      - "Go Developer Intern"
      - "Golang Developer Fresher"
    secondary:
      - "Full Stack Intern"
      - "Full Stack Developer Fresher"
      - "Software Developer Fresher"
      - "API Developer Intern"
      - "SDE Intern"

  # Experience level — CRITICAL
  experience:
    years: 0                        # Fresher — graduating May 2027
    max_required: 1                 # HARD REJECT if job requires more than this
    acceptable_labels:
      - "fresher"
      - "0-1 years"
      - "intern"
      - "entry level"
      - "junior"
      - "0 years"
      - "trainee"

  # Tech stack (in order of strength)
  skills:
    strong:
      - "Go"
      - "Golang"
      - "TypeScript"
      - "REST APIs"
      - "gRPC"
      - "Protobuf"
      - "PostgreSQL"
      - "Redis"
      - "Docker"
      - "Git"
      - "Linux"
      - "Microservices"
    learning:
      - "Kubernetes"
      - "AWS"
      # - "Node.js"

  # Resume projects — used for context-based scoring
  projects:
    - name: "Zaraba — Crypto Exchange"
      description: "Built a full crypto exchange in Go with real-time order matching engine, in-memory orderbook, gRPC-based microservice architecture, wallet management, and trade execution using fixed-point arithmetic"
      relevance_signal: "Fintech, crypto, trading, payments, Go, gRPC, high-performance systems, real-time"
    - name: "Sentinel-Proxy — Real-time Traffic Monitor"
      description: "Reverse proxy built in Go with gRPC streaming that monitors outgoing traffic, tracks behavior with Redis, and flags suspicious data exfiltration patterns using adaptive thresholds"
      relevance_signal: "Go, gRPC, Redis, security, infrastructure, streaming, proxy"
    - name: "JobRadar — Automated Job Discovery Pipeline"
      description: "Built a fully automated job discovery and ranking pipeline in Python. Scrapes 12+ sources (ATS APIs, RSS feeds, Naukri, Internshala, YC, Serper), deduplicates, prefilters with heuristic rules, heuristically ranks with a profile-driven scoring model, then AI-scores top candidates using Groq (Llama-4). Delivers urgent matches via Telegram bot."
      relevance_signal: "Python, pipeline, automation, data engineering, REST APIs, AI integration, backend tooling, scraping, scheduler, distributed sources"
    - name: "CipherBin — Ephemeral Code Sharing"
      description: "Full-stack Go web app with Templ engine (server-side rendering), PostgreSQL backend with Clean Architecture, session-based authentication, prepared statements"
      relevance_signal: "Go, PostgreSQL, web development, security, clean architecture"

  # Education
  education:
    degree: "B.Tech Computer Science (IoT)"
    institution: "Techno Main Salt Lake, Kolkata"
    graduation: "May 2027"

  # Location preferences
  location:
    base: "Kolkata, India"
    acceptable:
      - "Remote"
      - "Work from home"
      - "Anywhere in India"           # open to relocate
      - "gurugram"
      - "Bangalore"
      - "Mumbai"
      - "Hyderabad"
      - "Delhi NCR"
      - "Chennai"
      - "Kolkata"
    hard_reject:
      - "US only"
      - "UK only"
      - "Europe only"
      - "On-site outside India"

  # Industry preferences (affects bonus scoring)
  industries:
    high_priority:                   # +2 score bonus
      - "Fintech"
      - "Crypto"
      - "Blockchain"
      - "Payments"
      - "Trading"
      - "Banking technology"
      - "Financial services"
    medium_priority:                 # +1 score bonus
      - "SaaS"
      - "Developer tools"
      - "Infrastructure"
      - "API-first companies"
      - "E-commerce backend"
      - "Cybersecurity"
      - "DevTools"

  # Compensation
  salary:
    min_stipend_inr: 10000           # per month for internships
    min_ctc_lpa: 4.0                 # for full-time fresher roles

# Hard reject rules — checked BEFORE AI, saves tokens
hard_reject:
  max_job_age_days: 45              # Tightened: reject jobs older than 45 days
  ats_per_company_cap: 25           # Max ATS jobs per company per run (prevents LinkedIn/Spotify dominance)
  max_ai_jobs_per_run: 150          # Raised from 130 → 150 after v6 free-tier audit.
                                    # Rate limit math (gemini-3.1-flash-lite free tier):
                                    #   150 jobs × 4.5s = 11.25 min scoring phase (+1.5 min vs 130)
                                    #   150 × 2 runs/day = 300 RPD = 20% of ~1,500 RPD budget
                                    #   150 × ~3,150 tok × 2 = 945K TPD = 63% of ~1,500K TPD
                                    #   RPM: 13.3 req/min, unchanged — safely under 15 RPM
                                    # Why not higher: ranker scores 131–150 are in heuristic 12–13
                                    # (below the IQR midpoint). Beyond 150, signal-to-noise drops.

  experience_keywords:
    # If ANY of these appear in the job description → immediate reject
    - "2+ years"
    - "2 years experience"
    - "3+ years"
    - "4+ years"
    - "5+ years"
    - "6+ years"
    - "7+ years"
    - "8+ years"
    - "9+ years"
    - "10+ years"
    - "minimum 2 years"
    - "at least 2 years"
    - "senior engineer"
    - "senior developer"
    - "lead engineer"
    - "tech lead"
    - "principal engineer"
    - "staff engineer"

