    acceptable_labels:
      - "fresher"
      - "0-1 years"
      - "intern"
      - "entry level"
      - "junior"
      - "0 years"
      - "trainee"

  # Tech stack (in order of strength)
  skills:
    strong:
      - "Go"
      - "Golang"
      - "TypeScript"
      - "REST APIs"
      - "gRPC"
      - "Protobuf"
      - "PostgreSQL"
      - "Redis"
      - "Docker"
      - "Git"
      - "Linux"
    learning:
      - "Kubernetes"
      - "AWS"
      - "Node.js"
      - "Microservices"

  # Resume projects — used for context-based scoring
  projects:
    - name: "Zaraba — Crypto Exchange"
      description: "Built a full crypto exchange in Go with real-time order matching engine, in-memory orderbook, gRPC-based microservice architecture, wallet management, and trade execution using fixed-point arithmetic"
      relevance_signal: "Fintech, crypto, trading, payments, Go, gRPC, high-performance systems, real-time"
    - name: "CipherBin — Ephemeral Code Sharing"
      description: "Full-stack Go web app with Templ engine (server-side rendering), PostgreSQL backend with Clean Architecture, session-based authentication, prepared statements"
      relevance_signal: "Go, PostgreSQL, web development, security, clean architecture"
    - name: "Sentinel-Proxy — Real-time Traffic Monitor"
      description: "Reverse proxy built in Go with gRPC streaming that monitors outgoing traffic, tracks behavior with Redis, and flags suspicious data exfiltration patterns using adaptive thresholds"
      relevance_signal: "Go, gRPC, Redis, security, infrastructure, streaming, proxy"

  # Education
  education:
    degree: "B.Tech Computer Science (IoT)"
    institution: "Techno Main Salt Lake, Kolkata"
    graduation: "May 2027"

  # Location preferences
  location:
    base: "Kolkata, India"
    acceptable:
      - "Remote"
      - "Work from home"
      - "Anywhere in India"           # open to relocate
      - "Bangalore"
      - "Mumbai"
      - "Hyderabad"
      - "Delhi NCR"
      - "Chennai"
      - "Kolkata"
    hard_reject:
      - "US only"
      - "UK only"
      - "Europe only"
      - "On-site outside India"

  # Industry preferences (affects bonus scoring)
  industries:
    high_priority:                   # +2 score bonus
      - "Fintech"
      - "Crypto"
      - "Blockchain"
      - "Payments"
      - "Trading"
      - "Banking technology"
      - "Financial services"
    medium_priority:                 # +1 score bonus
      - "SaaS"
      - "Developer tools"
      - "Infrastructure"
      - "API-first companies"
      - "E-commerce backend"
      - "Cybersecurity"
      - "DevTools"

  # Compensation
  salary:
    min_stipend_inr: 10000           # per month for internships
    min_ctc_lpa: 4.0                 # for full-time fresher roles

# Hard reject rules — checked BEFORE AI, saves tokens
hard_reject:
  max_job_age_days: 45              # Tightened: reject jobs older than 45 days

  experience_keywords:
    # If ANY of these appear in the job description → immediate reject
    - "2+ years"
    - "2 years experience"
    - "3+ years"
    - "4+ years"
    - "5+ years"
    - "minimum 2 years"
    - "at least 2 years"
    - "senior engineer"
    - "senior developer"
    - "lead engineer"
    - "tech lead"
    - "principal engineer"
    - "staff engineer"

  company_blacklist:
    # IT services / consultancies — typically not product work
    # Uncomment if you want to exclude these
    # - "TCS"
    # - "Infosys"
    # - "Wipro"
    # - "HCL"
    # - "Cognizant"
    # - "Accenture"
    # - "Capgemini"
    # - "Tech Mahindra"

  role_blacklist:
    # Unrelated roles that might appear in searches
    - "Data Scientist"
    - "Machine Learning Engineer"
    - "ML Engineer"
    - "DevOps Engineer"               # unless it also has backend component
    - "QA Engineer"
    - "Test Engineer"
    - "Business Analyst"
    - "Product Manager"
    - "UI Designer"
    - "UX Designer"
    - "Frontend Developer"            # unless full-stack

# Scoring weights (used in AI prompt)
scoring_weights:
  golang_mentioned: +2
  typescript_mentioned: +1
  backend_focused: +1
  fintech_crypto_company: +2
  remote_or_india: +1
  project_stack_match: +2           # if crypto exchange / sentinel-proxy is relevant
  exact_role_match: +2
  mentions_equity_esop: +0.5
  unknown_company: -0.5             # slight penalty for no-info companies
