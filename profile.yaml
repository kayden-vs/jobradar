    # (confirmed leaking through in v6 run, scoring 1-3, wasting API calls)
    - "Sales Engineer"
    - "Solutions Engineer"
    - "Customer Engineer"
    - "Customer Success Engineer"
    - "Forward Deployed Engineer"
    - "Revenue Enablement"
    - "Business Development Representative"
    - "Sales Development Representative"
    - "Security Sales"
    - "Customer Experience Engineer"
    - "HR Business Partner"
    - "Designer, Web"
    - "Internal Audit"
    - "GTM Engineer"                  # Go-to-market, not backend
    - "FinOps Engineer"               # Finance ops, not engineering
    - "PlatformOps Engineer"          # Operations, not SWE
    # Senior / over-qualified roles — always score 1-2, waste token budget
    - "Senior Software"
    - "Senior Backend"
    - "Senior Frontend"
    - "Senior Full"
    - "Senior Java"
    - "Senior Golang"
    - "Senior Engineer"
    - "Senior Developer"
    - "Senior Infra"
    - "Senior SRE"
    - "Senior Security"
